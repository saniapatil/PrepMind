server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api {
    proxy_pass https://prepmind-backend-latest.onrender.com;
    proxy_set_header Host prepmind-backend-latest.onrender.com;
    proxy_http_version 1.1;
    proxy_set_header Host prepmind-backend-djg9.onrender.com;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_ssl_server_name on;
}
}